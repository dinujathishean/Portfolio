# Optional: deploy this folder at https://app.netlify.com/drop (drag & drop)
# or connect the repo to Netlify for automatic deploys.

[build]
  publish = "web"
  command = "echo Static site; exit 0"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
